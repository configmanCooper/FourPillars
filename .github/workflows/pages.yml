## Deploys the STATIC client (public/ + the shared/ UMD modules) to GitHub Pages.
## The Pages site is only the front-end — it connects to a separately-hosted Node + Socket.IO
## server (set the server URL in the lobby's "Server connection" panel, or via ?server=<url>).
## In the repo: Settings → Pages → Build and deployment → Source = "GitHub Actions".
name: Deploy client to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static client (public/ + shared/)
        run: |
          mkdir -p dist/shared
          cp -r public/. dist/
          cp shared/*.js dist/shared/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
